name: Freelanceinvoice
options:
  bundleIdPrefix: com.shimondeitel.freelanceinvoice
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Freelanceinvoice:
    type: application
    platform: iOS
    sources:
      - path: Freelanceinvoice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.freelanceinvoice
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Freelanceinvoice/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FreelanceinvoiceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FreelanceinvoiceTests
      - path: Freelanceinvoice.storekit
    dependencies:
      - target: Freelanceinvoice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.freelanceinvoice.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FreelanceinvoiceUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FreelanceinvoiceUITests
    dependencies:
      - target: Freelanceinvoice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.freelanceinvoice.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Freelanceinvoice:
    build:
      targets:
        Freelanceinvoice: all
        FreelanceinvoiceTests: [test]
        FreelanceinvoiceUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Freelanceinvoice.storekit
    test:
      config: Debug
      storeKitConfiguration: Freelanceinvoice.storekit
      targets:
        - FreelanceinvoiceTests
        - FreelanceinvoiceUITests
    archive:
      config: Release
